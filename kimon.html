<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇門遁甲 時盤 | 結ゆう</title>
<style>
  :root{
    --lacquer:#151d33;        /* 漆藍：盤の地 */
    --lacquer-deep:#0e1425;
    --paper:#f6f0e1;          /* 生成り紙：九宮 */
    --paper-dim:#e9e1cd;
    --sumi:#2b2620;           /* 墨 */
    --sumi-soft:#5d5648;
    --shu:#c73e3a;            /* 朱：値符・用神 */
    --kin:#b8934a;            /* 金茶：吉 */
    --ai:#3d6b8e;             /* 藍鼠：凶・水 */
    --line:#c9bfa5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--lacquer);
    background-image:radial-gradient(ellipse at 50% -10%, #223055 0%, var(--lacquer) 55%, var(--lacquer-deep) 100%);
    color:var(--paper);
    font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
    min-height:100vh;
    padding:18px 12px 48px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  header{text-align:center;margin-bottom:18px;}
  header h1{
    font-size:clamp(1.5rem,4.5vw,2.1rem);
    letter-spacing:.42em;
    text-indent:.42em;
    font-weight:600;
    color:var(--paper);
  }
  header .sub{
    margin-top:6px;
    font-size:.78rem;
    letter-spacing:.3em;
    color:#8fa0c2;
  }
  /* ---- 入力 ---- */
  .controls{
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    margin-bottom:14px;align-items:center;
  }
  .controls input[type="datetime-local"]{
    background:var(--lacquer-deep);
    border:1px solid #3a4a72;
    color:var(--paper);
    padding:9px 10px;border-radius:6px;
    font-family:inherit;font-size:.95rem;
  }
  .btn{
    background:var(--shu);color:#fff;border:none;
    padding:9px 20px;border-radius:6px;cursor:pointer;
    font-family:inherit;font-size:.95rem;letter-spacing:.15em;
  }
  .btn.ghost{background:transparent;border:1px solid #3a4a72;color:#aebbd8;}
  .btn.gold{background:transparent;border:1px solid var(--kin);color:var(--kin);}
  .btn:active{transform:translateY(1px);}
  /* ---- 局情報 ---- */
  .juinfo{
    display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;
    font-size:.82rem;color:#c4cee6;margin-bottom:16px;line-height:1.7;
  }
  .juinfo b{color:var(--paper);font-weight:600;}
  .juinfo .ju-main{
    width:100%;text-align:center;font-size:1.02rem;letter-spacing:.2em;color:var(--kin);
  }
  /* ---- 盤 ---- */
  .board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
    background:var(--lacquer-deep);
    border:1px solid #3a4a72;
    border-radius:10px;
    padding:8px;
    box-shadow:0 8px 30px rgba(0,0,0,.45), inset 0 0 40px rgba(20,30,60,.6);
  }
  .compass{
    text-align:center;font-size:.72rem;letter-spacing:.5em;text-indent:.5em;
    color:#8fa0c2;margin:4px 0;
  }
  .cell{
    background:var(--paper);
    color:var(--sumi);
    border-radius:5px;
    padding:7px 6px 6px;
    min-height:118px;
    position:relative;
    cursor:pointer;
    transition:box-shadow .15s, transform .15s;
    display:flex;flex-direction:column;
  }
  .cell:hover{box-shadow:0 0 0 2px var(--kin);}
  .cell.hl{box-shadow:0 0 0 3px var(--shu);transform:scale(1.02);z-index:2;}
  .cell.center{
    background:var(--paper-dim);
    color:var(--sumi-soft);
    cursor:default;
  }
  .cell .pal{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:.62rem;color:var(--sumi-soft);letter-spacing:.08em;
    border-bottom:1px solid var(--line);padding-bottom:3px;margin-bottom:4px;
  }
  .cell .deity{
    font-size:.78rem;letter-spacing:.25em;color:var(--ai);
    text-align:center;margin-bottom:2px;font-weight:600;
  }
  .row2{
    display:flex;justify-content:center;align-items:baseline;gap:10px;
    font-size:1.02rem;line-height:1.5;
  }
  .row2 .star{font-size:.92rem;}
  .row2 .stem{font-size:1.18rem;font-weight:600;}
  .row2 .gate{font-size:.98rem;font-weight:600;}
  .stem.ten{color:#8a2422;}
  .stem.chi{color:var(--sumi);}
  .gate.good{color:var(--kin);filter:brightness(.75);}
  .gate.bad{color:var(--ai);}
  .badges{
    position:absolute;top:4px;right:4px;display:flex;gap:3px;flex-direction:column;align-items:flex-end;
  }
  .seal{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:50%;
    border:1.5px solid var(--shu);color:var(--shu);
    font-size:.6rem;font-weight:700;background:rgba(199,62,58,.06);
  }
  .seal.k{border-color:var(--ai);color:var(--ai);background:rgba(61,107,142,.08);}
  .marks{
    margin-top:auto;padding-top:3px;
    font-size:.6rem;color:var(--sumi-soft);letter-spacing:.1em;
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
  }
  /* ---- 用神ガイド ---- */
  .section{margin-top:22px;}
  .section h2{
    font-size:.92rem;letter-spacing:.35em;text-indent:.35em;
    color:#c4cee6;text-align:center;margin-bottom:10px;font-weight:600;
  }
  .chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
  .chip{
    border:1px solid #3a4a72;background:var(--lacquer-deep);
    color:#c4cee6;border-radius:99px;padding:6px 13px;
    font-size:.8rem;cursor:pointer;font-family:inherit;letter-spacing:.08em;
    transition:all .15s;
  }
  .chip.on{border-color:var(--shu);color:#ffb3ae;background:rgba(199,62,58,.12);}
  .chip small{opacity:.65;margin-left:4px;font-size:.68rem;}
  /* ---- 格局 ---- */
  .patterns{display:grid;gap:6px;}
  .pat{
    background:var(--lacquer-deep);border:1px solid #2c3a5e;border-radius:7px;
    padding:8px 12px;font-size:.82rem;line-height:1.65;color:#d5dcee;
    display:flex;gap:10px;align-items:baseline;
  }
  .pat .tag{
    flex:none;font-size:.68rem;padding:2px 8px;border-radius:4px;letter-spacing:.1em;
  }
  .pat.good .tag{background:rgba(184,147,74,.18);color:var(--kin);border:1px solid rgba(184,147,74,.5);}
  .pat.bad .tag{background:rgba(61,107,142,.18);color:#7ea6c8;border:1px solid rgba(61,107,142,.5);}
  .pat .pos{color:#8fa0c2;font-size:.72rem;margin-left:6px;}
  /* ---- 詳細パネル ---- */
  .detail{
    background:var(--paper);color:var(--sumi);border-radius:9px;
    padding:14px 16px;font-size:.86rem;line-height:1.9;display:none;
  }
  .detail.show{display:block;}
  .detail h3{
    font-size:1rem;letter-spacing:.2em;border-bottom:1px solid var(--line);
    padding-bottom:6px;margin-bottom:8px;color:#8a2422;font-weight:600;
  }
  .detail dt{font-weight:600;color:var(--sumi);float:left;width:6.2em;}
  .detail dd{margin-left:6.6em;color:var(--sumi-soft);}
  .note{
    margin-top:26px;text-align:center;font-size:.7rem;color:#6d7ea3;
    letter-spacing:.15em;line-height:2;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>奇門遁甲 時盤</h1>
    <div class="sub">QIMEN DUNJIA ─ 結ゆう</div>
  </header>

  <div class="controls">
    <input type="datetime-local" id="dt">
    <button class="btn" id="go">立局</button>
    <button class="btn ghost" id="now">今この瞬間</button>
  </div>
  <div class="controls">
    <button class="btn gold" id="copyai">AIへの発注文をコピー（盤データつき）</button>
  </div>

  <div class="juinfo" id="juinfo"></div>

  <div class="compass">南</div>
  <div class="board" id="board"></div>
  <div class="compass">北</div>

  <div class="section">
    <h2>用神をさがす</h2>
    <div class="chips" id="chips"></div>
  </div>

  <div class="section">
    <div class="detail" id="detail"></div>
  </div>

  <div class="section">
    <h2>格局</h2>
    <div class="patterns" id="patterns"></div>
  </div>

  <div class="note">
    転盤式・時家奇門（超接置閏系の自動計算）による立局です。<br>
    宮をタップすると詳細、用神チップで該当宮が朱く光ります。
  </div>
</div>

，十日之中主有殃，田地消磨官失职，接运定是虎狼伤，嫁娶婚姻用此日，儿孙新妇守空房，埋葬若还用此日，当时害祸主重伤。","{xx.di}":"氐星造作主灾凶，费尽田园仓库空，埋葬不可用此日，悬绳吊颈祸重重，若是婚姻离别散，夜招浪子入房中，行船必定遭沉没，更生聋哑子孙穷。","{xx.fang}":"房星造作田园进，钱财牛马遍山岗，更招外处田庄宅，荣华富贵福禄康，埋葬若然用此日，高官进职拜君王，嫁娶嫦娥至月殿，三年抱子至朝堂。","{xx.xin}":"心星造作大为凶，更遭刑讼狱囚中，忤逆官非宅产退，埋葬卒暴死相从，婚姻若是用此日，子死儿亡泪满胸，三年之内连遭祸，事事教君没始终。","{xx.tail}":"尾星造作主天恩，富贵荣华福禄增，招财进宝兴家宅，和合婚姻贵子孙，埋葬若能依此日，男清女正子孙兴，开门放水招田宅，代代公侯远播名。","{xx.ji}":"箕星造作主高强，岁岁年年大吉昌，埋葬修坟大吉利，田蚕牛马遍山岗，开门放水招田宅，箧满金银谷满仓，福荫高官加禄位，六亲丰禄乐安康。","{xx.dou}":"斗星造作主招财，文武官员位鼎台，田宅家财千万进，坟堂修筑贵富来，开门放水招牛马，旺蚕男女主和谐，遇此吉宿来照护，时支福庆永无灾。","{xx.niu}":"牛星造作主灾危，九横三灾不可推，家宅不安人口退，田蚕不利主人衰，嫁娶婚姻皆自损，金银财谷渐无之，若是开门并放水，牛猪羊马亦伤悲。","{xx.nv}":"女星造作损婆娘，兄弟相嫌似虎狼，埋葬生灾逢鬼怪，颠邪疾病主瘟惶，为事遭官财失散，泻利留连不可当，开门放水用此日，全家财散主离乡。","{xx.xu}":"虚星造作主灾殃，男女孤眠不一双，内乱风声无礼节，儿孙媳妇伴人床，开门放水遭灾祸，虎咬蛇伤又卒亡，三三五五连年病，家破人亡不可当。","{xx.wei}":"危星不可造高楼，自遭刑吊见血光，三年孩子遭水厄，后生出外永不还，埋葬若还逢此日，周年百日取高堂，三年两载一悲伤，开门放水到官堂。","{xx.shi}":"室星修造进田牛，儿孙代代近王侯，家贵荣华天上至，寿如彭祖八千秋，开门放水招财帛，和合婚姻生贵儿，埋葬若能依此日，门庭兴旺福无休。","{xx.qiang}":"壁星造作主增财，丝蚕大熟福滔天，奴婢自来人口进，开门放水出英贤，埋葬招财官品进，家中诸事乐陶然，婚姻吉利主贵子，早播名誉著祖鞭。","{xx.kui}":"奎星造作得祯祥，家内荣和大吉昌，若是埋葬阴卒死，当年定主两三伤，看看军令刑伤到，重重官事主瘟惶，开门放水遭灾祸，三年两次损儿郎。","{xx.lou}":"娄星修造起门庭，财旺家和事事兴，外进钱财百日进，一家兄弟播高名，婚姻进益生贵子，玉帛金银箱满盈，放水开门皆吉利，男荣女贵寿康宁。","{xx.vei}":"胃星造作事如何，家贵荣华喜气多，埋葬贵临官禄位，夫妇齐眉永保康，婚姻遇此家富贵，三灾九祸不逢他，从此门前多吉庆，儿孙代代拜金阶。","{xx.mao}":"昴星造作进田牛，埋葬官灾不得休，重丧二日三人死，尽卖田园不记增，开门放水招灾祸，三岁孩儿白了头，婚姻不可逢此日，死别生离是可愁。","{xx.bi}":"毕星造作主光前，买得田园有余钱，埋葬此日添官职，田蚕大熟永丰年，开门放水多吉庆，合家人口得安然，婚姻若得逢此日，生得孩儿福寿全。","{xx.zi}":"觜星造作有徒刑，三年必定主伶丁，埋葬卒死多因此，取定寅年使杀人，三丧不止皆由此，一人药毒二人身，家门田地皆退败，仓库金银化作尘。","{xx.can}":"参星造作旺人家，文星照耀大光华，只因造作田财旺，埋葬招疾哭黄沙，开门放水加官职，房房子孙见田加，婚姻许遁遭刑克，男女朝开幕落花。","{xx.jing}":"井星造作旺蚕田，金榜题名第一光，埋葬须防惊卒死，狂颠风疾入黄泉，开门放水招财帛，牛马猪羊旺莫言，贵人田塘来入宅，儿孙兴旺有余钱。","{xx.gui}":"鬼星起造卒人亡，堂前不见主人郎，埋葬此日官禄至，儿孙代代近君王，开门放水须伤死，嫁娶夫妻不久长，修土筑墙伤产女，手扶双女泪汪汪。","{xx.liu}":"柳星造作主遭官，昼夜偷闭不暂安，埋葬瘟惶多疾病，田园退尽守冬寒，开门放水遭聋瞎，腰驼背曲似弓弯，更有棒刑宜谨慎，妇人随客走盘桓。","{xx.xing}":"星宿日好造新房，进职加官近帝王，不可埋葬并放水，凶星临位女人亡，生离死别无心恋，要自归休别嫁郎，孔子九曲殊难度，放水开门天命伤。","{xx.zhang}":"张星日好造龙轩，年年并见进庄田，埋葬不久升官职，代代为官近帝前，开门放水招财帛，婚姻和合福绵绵，田蚕人满仓库满，百般顺意自安然。","{xx.yi}":"翼星不利架高堂，三年二载见瘟惶，埋葬若还逢此日，子孙必定走他乡，婚姻此日不宜利，归家定是不相当，开门放水家须破，少女恋花贪外郎。","{xx.zhen}":"轸星临水造龙宫，代代为官受皇封，富贵荣华增寿禄，库满仓盈自昌隆，埋葬文昌来照助，宅舍安宁不见凶，更有为官沾帝宠，婚姻龙子入龙宫。"},o.ZHENG={"{xx.jiao}":"{wx.mu}","{xx.jing}":"{wx.mu}","{xx.kui}":"{wx.mu}","{xx.dou}":"{wx.mu}","{xx.kang}":"{wx.jin}","{xx.gui}":"{wx.jin}","{xx.lou}":"{wx.jin}","{xx.niu}":"{wx.jin}","{xx.di}":"{wx.tu}","{xx.liu}":"{wx.tu}","{xx.vei}":"{wx.tu}","{xx.nv}":"{wx.tu}","{xx.fang}":"{wx.ri}","{xx.xing}":"{wx.ri}","{xx.mao}":"{wx.ri}","{xx.xu}":"{wx.ri}","{xx.xin}":"{wx.yue}","{xx.zhang}":"{wx.yue}","{xx.bi}":"{wx.yue}","{xx.wei}":"{wx.yue}","{xx.tail}":"{wx.huo}","{xx.yi}":"{wx.huo}","{xx.zi}":"{wx.huo}","{xx.shi}":"{wx.huo}","{xx.ji}":"{wx.shui}","{xx.zhen}":"{wx.shui}","{xx.can}":"{wx.shui}","{xx.qiang}":"{wx.shui}"},o.ANIMAL={"{xx.jiao}":"{dw.jiao}","{xx.dou}":"{dw.xie}","{xx.kui}":"{dw.lang}","{xx.jing}":"{dw.han}","{xx.kang}":"{dw.long}","{xx.niu}":"{dw.niu}","{xx.lou}":"{dw.gou}","{xx.gui}":"{dw.yang}","{xx.nv}":"{dw.fu}","{xx.di}":"{dw.he}","{xx.vei}":"{dw.zhi}","{xx.liu}":"{dw.zhang}","{xx.fang}":"{dw.tu}","{xx.xu}":"{dw.shu}","{xx.mao}":"{dw.ji}","{xx.xing}":"{dw.ma}","{xx.xin}":"{dw.huLi}","{xx.wei}":"{dw.yan}","{xx.bi}":"{dw.wu}","{xx.zhang}":"{dw.lu}","{xx.tail}":"{dw.hu}","{xx.shi}":"{dw.zhu}","{xx.zi}":"{dw.hou}","{xx.yi}":"{dw.she}","{xx.ji}":"{dw.bao}","{xx.qiang}":"{dw.xu}","{xx.can}":"{dw.yuan}","{xx.zhen}":"{dw.yin}"},o.GONG={"{xx.jiao}":"{ps.dong}","{xx.jing}":"{ps.nan}","{xx.kui}":"{ps.xi}","{xx.dou}":"{ps.bei}","{xx.kang}":"{ps.dong}","{xx.gui}":"{ps.nan}","{xx.lou}":"{ps.xi}","{xx.niu}":"{ps.bei}","{xx.di}":"{ps.dong}","{xx.liu}":"{ps.nan}","{xx.vei}":"{ps.xi}","{xx.nv}":"{ps.bei}","{xx.fang}":"{ps.dong}","{xx.xing}":"{ps.nan}","{xx.mao}":"{ps.xi}","{xx.xu}":"{ps.bei}","{xx.xin}":"{ps.dong}","{xx.zhang}":"{ps.nan}","{xx.bi}":"{ps.xi}","{xx.wei}":"{ps.bei}","{xx.tail}":"{ps.dong}","{xx.yi}":"{ps.nan}","{xx.zi}":"{ps.xi}","{xx.shi}":"{ps.bei}","{xx.ji}":"{ps.dong}","{xx.zhen}":"{ps.nan}","{xx.can}":"{ps.xi}","{xx.qiang}":"{ps.bei}"},o.SHOU={"{ps.dong}":"{sn.qing     const el = document.getElementById("juinfo");
    el.innerHTML =
      `<div class="ju-main">${jp(chart.ju.type)} 第${chart.ju.number}局（${jp(chart.yuan)}）─ ${jp(t.solarTerm)}</div>`+
      `<span>四柱　<b>${fp.year.stem}${fp.year.branch}</b>年 <b>${fp.month.stem}${fp.month.branch}</b>月 <b>${fp.day.stem}${fp.day.branch}</b>日 <b>${fp.hour.stem}${fp.hour.branch}</b>時</span>`+
      `<span>旬首 <b>${jp(t.xunShou)}</b></span>`+
      `<span>空亡 <b>${t.voidness.map(jp).join("・")}</b></span>`+
      `<span>値符 <b>${jp(chart.zhiFu.star)}</b>（${chart.zhiFu.position}宮）</span>`+
      `<span>値使 <b>${jp(chart.zhiShi.gate)}</b>（${chart.zhiShi.position}宮）</span>`;
  }

  function renderBoard(){
    const bd = document.getElementById("board");
    bd.innerHTML = "";
    GRID.forEach(pos=>{
      const p = chart.palaces[pos-1];
      const cell = document.createElement("div");
      cell.className = "cell" + (pos===5 ? " center" : "");
      cell.dataset.pos = pos;
      const gate = jp(arr(p.gate)[0]||"");
      const gi = GATE_INFO[gate];
      const gcls = gi ? (gi.q==="吉"?"good":gi.q==="凶"?"bad":"") : "";
      const badges = [];
      if(p.isZhiFu) badges.push('<span class="seal">符</span>');
      if(p.isZhiShi) badges.push('<span class="seal">使</span>');
      const marks = [];
      if(p.voidness) marks.push("空亡");
      if(p.isPostHorse) marks.push("馬");
      if(p.status) marks.push(jp(p.status));
      cell.innerHTML =
        `<div class="pal"><span>${TRI[pos][0]}${pos}宮</span><span>${TRI[pos][1]}</span></div>`+
        (pos===5
          ? `<div class="deity" style="color:var(--sumi-soft)">─</div>
             <div class="row2"><span class="star">${stems(p.star)}</span><span class="stem ten">${stems(p.heavenlyStem)}</span></div>
             <div class="row2"><span style="font-size:.72rem;color:var(--sumi-soft)">寄宮</span><span class="stem chi">${stems(p.earthlyStem)}</span></div>`
          : `<div class="deity">${jp(arr(p.deity)[0]||"")}</div>
             <div class="row2"><span class="star">${stems(p.star)}</span><span class="stem ten">${stems(p.heavenlyStem)}</span></div>
             <div class="row2"><span class="gate ${gcls}">${gate}</span><span class="stem chi">${stems(p.earthlyStem)}</span></div>`)+
        `<div class="badges">${badges.join("")}</div>`+
        `<div class="marks">${marks.map(m=>`<span>${m}</span>`).join("")}</div>`;
      if(pos!==5) cell.addEventListener("click",()=>showDetail(pos));
      bd.appendChild(cell);
    });
  }

  /* 用神チップ */
  function findStem(stem){
    const hits = [];
    chart.palaces.forEach(p=>{
      if(arr(p.heavenlyStem).includes(stem)) hits.push(p.position);
    });
    return hits;
  }
  function findGate(gateJp){
    const hits = [];
    chart.palaces.forEach(p=>{
      if(jp(arr(p.gate)[0]||"")===gateJp) hits.push(p.position);
    });
    return hits;
  }

  function renderChips(){
    const fp = chart.fourPillars;
    const defs = [
      {label:"日干（自分）", sub:fp.day.stem, pos:()=>findStem(fp.day.stem)},
      {label:"時干（事柄）", sub:fp.hour.stem, pos:()=>findStem(fp.hour.stem)},
      {label:"値符（大局・目上）", sub:"", pos:()=>[chart.zhiFu.position]},
      {label:"値使（動き方）", sub:"", pos:()=>[chart.zhiShi.position]},
      {label:"生門（お金・利益）", sub:"", pos:()=>findGate("生門")},
      {label:"開門（仕事・公開）", sub:"", pos:()=>findGate("開門")},
      {label:"休門（縁・休息）", sub:"", pos:()=>findGate("休門")},
      {label:"景門（発信・文書）", sub:"", pos:()=>findGate("景門")},
      {label:"乙（女性・調和）", sub:"", pos:()=>findStem("乙")},
      {label:"丙（勢い・表舞台）", sub:"", pos:()=>findStem("丙")},
      {label:"丁（ひらめき・情報）", sub:"", pos:()=>findStem("丁")},
      {label:"戊（資本・元手）", sub:"", pos:()=>findStem("戊")}
    ];
    const el = document.getElementById("chips");
    el.innerHTML = "";
    defs.forEach(d=>{
      const b = document.createElement("button");
      b.className = "chip";
      b.innerHTML = d.label + (d.sub?`<small>${d.sub}</small>`:"");
      b.addEventListener("click",()=>{
        const on = b.classList.contains("on");
        el.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));
        document.querySelectorAll(".cell").forEach(c=>c.classList.remove("hl"));
        if(!on){
          b.classList.add("on");
          const ps = d.pos();
          ps.forEach(pp=>{
            const c = document.querySelector(`.cell[data-pos="${pp}"]`);
            if(c) c.classList.add("hl");
          });
          if(ps.length===1) showDetail(ps[0]);
        }
      });
      el.appendChild(b);
    });
  }

  function showDetail(pos){
    const p = chart.palaces[pos-1];
    const gate = jp(arr(p.gate)[0]||"");
    const star = stems(p.star);
    const deity = jp(arr(p.deity)[0]||"");
    const gi = GATE_INFO[gate];
    const pats = [...(p.auspiciousPatterns||[]), ...(p.inauspiciousPatterns||[])]
      .map(x=>jp(x.description||x.name||"")).filter(Boolean);
    const tsr = p.tenStemResponse ? jp(p.tenStemResponse.description||p.tenStemResponse.name||JSON.stringify(p.tenStemResponse)) : "";
    const d = document.getElementById("detail");
    d.innerHTML =
      `<h3>${TRI[pos][0]}${pos}宮（${TRI[pos][1]}）</h3>
       <dl>
         <dt>八神</dt><dd>${deity}　${DEITY_INFO[deity]||""}</dd>
         <dt>九星</dt><dd>${star}　${STAR_INFO[star]||""}</dd>
         <dt>八門</dt><dd>${gate}${gi?`【${gi.q}】　${gi.m}`:""}</dd>
         <dt>天盤干</dt><dd>${stems(p.heavenlyStem)}</dd>
         <dt>地盤干</dt><dd>${stems(p.earthlyStem)}</dd>
         ${p.status?`<dt>旺衰</dt><dd>${jp(p.status)}</dd>`:""}
         ${tsr?`<dt>十干克応</dt><dd>${tsr}</dd>`:""}
         ${pats.length?`<dt>この宮の格</dt><dd>${pats.join("／")}</dd>`:""}
       </dl>`;
    d.classList.add("show");
    d.scrollIntoView({behavior:"smooth",block:"nearest"});
  }

  function renderPatterns(){
    const el = document.getElementById("patterns");
    el.innerHTML = "";
    const sp = chart.specialPatterns || {};
    const rows = [];
    (sp.auspiciousPatterns||[]).forEach(x=>rows.push({good:true, name:jp(x.name||x.type||""), desc:jp(x.description||""), pos:x.position}));
    (sp.inauspiciousPatterns||[]).forEach(x=>rows.push({good:false, name:jp(x.name||x.type||""), desc:jp(x.description||""), pos:x.position}));
    if(!rows.length){ el.innerHTML = '<div class="pat"><span>特筆すべき格はありません</span></div>'; return; }
    rows.forEach(r=>{
      const div = document.createElement("div");
      div.className = "pat " + (r.good?"good":"bad");
      div.innerHTML = `<span class="tag">${r.good?"吉":"凶"}</span><span>${r.name}${r.desc?`　${r.desc}`:""}${r.pos?`<span class="pos">${r.pos}宮</span>`:""}</span>`;
      div.addEventListener("click",()=>{ if(r.pos) showDetail(r.pos); });
      el.appendChild(div);
    });
  }

  /* AI発注文の生成 */
  function buildAiText(){
    const t = chart.timeInfo, fp = chart.fourPillars;
    const pil = p => p.stem + p.branch;
    let s = "";
    s += "あなたは奇門遁甲（時家奇門・転盤式）にくわしい、誠実な解説者です。\n";
    s += "以下は専用ツールで正確に計算した時盤データです。この盤だけを根拠に読み解いてください。\n\n";
    s += "【守ってほしいルール】\n";
    s += "・盤に書かれていない星・門・神・干を創作しない\n";
    s += "・吉凶は断定や脅しにせず「傾向」として、活かし方とセットで伝える\n";
    s += "・まず最初に「何について知りたいか（問い）」を私にひとつ確認してから読み始める\n";
    s += "・問いが決まったら、対応する用神（見るべき宮・干・門）を示し、盤のどこからそう読めるか根拠つきで解説する\n";
    s += "・専門用語には短い説明を添える\n\n";
    s += "【時盤データ】\n";
    s += "立局日時：" + document.getElementById("dt").value.replace("T"," ") + "\n";
    s += "節気：" + jp(t.solarTerm) + "／" + jp(chart.ju.type) + "第" + chart.ju.number + "局（" + jp(chart.yuan) + "）\n";
    s += "四柱：" + pil(fp.year) + "年 " + pil(fp.month) + "月 " + pil(fp.day) + "日 " + pil(fp.hour) + "時\n";
    s += "旬首：" + jp(t.xunShou) + "　空亡：" + t.voidness.map(jp).join("・") + "\n";
    s += "値符：" + jp(chart.zhiFu.star) + "（" + chart.zhiFu.position + "宮）　値使：" + jp(chart.zhiShi.gate) + "（" + chart.zhiShi.position + "宮）\n\n";
    s += "【九宮の配置】\n";
    GRID.forEach(pos=>{
      const p = chart.palaces[pos-1];
      const marks = [];
      if(p.isZhiFu) marks.push("値符");
      if(p.isZhiShi) marks.push("値使");
      if(p.voidness) marks.push("空亡");
      if(p.isPostHorse) marks.push("天馬");
      if(p.status) marks.push(jp(p.status));
      if(pos===5){
        s += "■中5宮（中央）：" + stems(p.star) + "・天盤干" + stems(p.heavenlyStem) + "／地盤干" + stems(p.earthlyStem) + "（寄宮）\n";
      }else{
        s += "■" + TRI[pos][0] + pos + "宮（" + TRI[pos][1] + "）：八神=" + jp(arr(p.deity)[0]||"") +
             "／九星=" + stems(p.star) + "・天盤干=" + stems(p.heavenlyStem) +
             "／八門=" + jp(arr(p.gate)[0]||"") + "・地盤干=" + stems(p.earthlyStem) +
             (marks.length ? "（" + marks.join("・") + "）" : "") + "\n";
      }
    });
    const sp = chart.specialPatterns || {};
    const g = (sp.auspiciousPatterns||[]).map(x=>jp(x.name||x.type||"")+(x.position?"("+x.position+"宮)":"")).join("、");
    const b = (sp.inauspiciousPatterns||[]).map(x=>jp(x.name||x.type||"")+(x.position?"("+x.position+"宮)":"")).join("、");
    s += "\n【格局】\n吉格：" + (g||"なし") + "\n凶格：" + (b||"なし") + "\n\n";
    s += "準備ができたら、まず私に「何について知りたいですか？」と聞いてください。\n";
    return s;
  }

  function copyText(text, btn){
    const done = ()=>{
      const orig = btn.textContent;
      btn.textContent = "コピーしました ✓";
      setTimeout(()=>{ btn.textContent = orig; }, 1800);
    };
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(()=>fallback());
    }else{ fallback(); }
    function fallback(){
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); done(); }catch(e){ alert("コピーできませんでした。長押しで選択してください。"); }
      document.body.removeChild(ta);
    }
  }

  document.getElementById("copyai").addEventListener("click",function(){
    if(!chart) return;
    copyText(buildAiText(), this);
  });

  /* 初期化：現在時刻（端末ローカル） */
  function nowStr(){
    const n = new Date();
    const pad = x=>String(x).padStart(2,"0");
    return n.getFullYear()+"-"+pad(n.getMonth()+1)+"-"+pad(n.getDate())+"T"+pad(n.getHours())+":"+pad(n.getMinutes());
  }
  const dtInput = document.getElementById("dt");
  dtInput.value = nowStr();
  document.getElementById("go").addEventListener("click",()=>{
    if(dtInput.value) build(dtInput.value.replace("T"," ")+":00");
  });
  document.getElementById("now").addEventListener("click",()=>{
    dtInput.value = nowStr();
    build(dtInput.value.replace("T"," ")+":00");
  });
  build(dtInput.value.replace("T"," ")+":00");
})();
</script>
