<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生命の木スプレッド｜結ゆう</title>
<style>
  :root{
    --indigo-deep:#0a0e2a;
    --indigo-mid:#141b4d;
    --violet-night:#1a1145;
    --gold:#e8c97a;
    --gold-soft:#d4af6a;
    --text-main:#f0edf7;
    --text-dim:#a9a3c4;
    --card-bg:rgba(20,27,77,.55);
    --card-line:rgba(232,201,122,.25);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    background:linear-gradient(180deg,var(--indigo-deep) 0%,var(--indigo-mid) 55%,var(--violet-night) 100%);
    color:var(--text-main);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    line-height:1.75;overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      radial-gradient(1px 1px at 20px 30px,#fff,transparent),
      radial-gradient(1px 1px at 90px 120px,rgba(255,255,255,.8),transparent),
      radial-gradient(1.5px 1.5px at 160px 60px,rgba(232,201,122,.9),transparent),
      radial-gradient(1px 1px at 220px 160px,rgba(255,255,255,.6),transparent),
      radial-gradient(1px 1px at 300px 90px,rgba(255,255,255,.7),transparent);
    background-size:340px 200px;background-repeat:repeat;opacity:.8;
  }
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:32px 16px 60px;}
  header{text-align:center;margin-bottom:22px;}
  .brand{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:13px;letter-spacing:.35em;color:var(--gold-soft);margin-bottom:10px;}
  h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:25px;font-weight:500;letter-spacing:.1em;}
  h1 small{display:block;font-size:12px;color:var(--text-dim);letter-spacing:.25em;margin-top:6px;}
  .lead{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:18px;}

  .panel{
    background:var(--card-bg);border:1px solid var(--card-line);
    border-radius:18px;padding:20px 16px;backdrop-filter:blur(4px);margin-bottom:20px;
  }
  .panel h2{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:15px;font-weight:500;letter-spacing:.18em;color:var(--gold);
    text-align:center;margin-bottom:12px;
  }
  .q-hint{font-size:12px;color:var(--text-dim);margin-bottom:8px;}
  #question{
    width:100%;background:rgba(10,14,42,.8);color:var(--text-main);
    border:1px solid var(--card-line);border-radius:10px;padding:12px;font-size:15px;
  }
  #question:focus{outline:2px solid var(--gold-soft);}

  svg{display:block;width:100%;height:auto;}
  .pos{cursor:pointer;}
  .pos circle{transition:filter .15s ease;}
  .pos:hover circle,.pos:focus circle{filter:brightness(1.4);}
  .pos.selected circle{stroke:var(--gold);stroke-width:3;}
  .pos.filled circle{fill:rgba(232,201,122,.14);}
  .pnum{font-size:10px;fill:var(--gold-soft);}
  .pname{font-size:12px;fill:var(--text-main);font-weight:600;}
  .pmean{font-size:9px;fill:var(--text-dim);}
  .pcard{font-size:10px;fill:var(--gold);font-weight:600;}
  .path-line{stroke:rgba(169,163,196,.4);stroke-width:1;}

  /* カード選択 */
  #picker{display:none;}
  .picker-title{text-align:center;font-size:14px;margin-bottom:4px;}
  .picker-title b{color:var(--gold);}
  .picker-mean{text-align:center;font-size:12px;color:var(--text-dim);margin-bottom:12px;}
  .sel-row{display:flex;gap:8px;margin-bottom:10px;}
  select{
    flex:1;min-width:0;background:rgba(10,14,42,.8);color:var(--text-main);
    border:1px solid var(--card-line);border-radius:10px;
    padding:12px 8px;font-size:15px;appearance:none;-webkit-appearance:none;text-align:center;
  }
  select:focus{outline:2px solid var(--gold-soft);}
  .rev-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:10px 0;}
  .rev-row label{font-size:14px;}
  #revCheck{width:20px;height:20px;accent-color:var(--gold);}
  .btn-row{display:flex;gap:10px;}
  .set-btn{
    flex:1;background:linear-gradient(135deg,var(--gold) 0%,var(--gold-soft) 100%);
    color:#1a1433;font-size:15px;font-weight:700;letter-spacing:.1em;
    border:none;border-radius:12px;padding:13px;cursor:pointer;
  }
  .unset-btn{
    flex:0 0 100px;background:transparent;color:var(--text-dim);
    border:1px solid rgba(169,163,196,.4);border-radius:12px;padding:13px;font-size:13px;cursor:pointer;
  }

  /* 一覧 */
  .list{font-size:13px;}
  .list div{display:flex;gap:8px;border-top:1px solid rgba(169,163,196,.15);padding:7px 0;align-items:baseline;}
  .list div:first-child{border-top:none;}
  .list .l-pos{flex:0 0 128px;color:var(--gold-soft);}
  .list .l-card{flex:1;}
  .list .l-card.empty{color:var(--text-dim);}
  .list .rev{color:#e08585;font-size:11px;margin-left:4px;}

  .copy-btn{
    display:block;width:100%;margin-top:16px;
    background:transparent;color:var(--gold);
    border:1px solid var(--gold-soft);border-radius:12px;
    padding:13px;font-size:14px;letter-spacing:.1em;cursor:pointer;
  }
  .copy-btn:hover{background:rgba(232,201,122,.1);}
  .copied{color:#1a1433;background:var(--gold)!important;font-weight:700;}
  .clear-btn{
    display:block;width:100%;margin-top:10px;
    background:transparent;color:var(--text-dim);
    border:1px solid rgba(169,163,196,.35);border-radius:12px;
    padding:11px;font-size:13px;cursor:pointer;
  }
  .note{font-size:11px;color:var(--text-dim);margin-top:10px;text-align:center;}
  footer{text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:.15em;margin-top:30px;}

  /* 合言葉ゲート */
  #gate{
    position:fixed;inset:0;z-index:50;
    background:linear-gradient(180deg,var(--indigo-deep) 0%,var(--violet-night) 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;
  }
  #gate .g-brand{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:13px;letter-spacing:.35em;color:var(--gold-soft);margin-bottom:18px;}
  #gate h1{font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:22px;font-weight:500;letter-spacing:.12em;margin-bottom:6px;}
  #gate p{font-size:13px;color:var(--text-dim);margin-bottom:22px;}
  #gate .g-box{width:100%;max-width:320px;}
  #gate input{
    width:100%;background:rgba(10,14,42,.8);color:var(--text-main);
    border:1px solid var(--card-line);border-radius:10px;
    padding:13px;font-size:16px;text-align:center;letter-spacing:.1em;
  }
  #gate input:focus{outline:2px solid var(--gold-soft);}
  #gate button{
    width:100%;margin-top:12px;
    background:linear-gradient(135deg,var(--gold) 0%,var(--gold-soft) 100%);
    color:#1a1433;font-size:15px;font-weight:700;letter-spacing:.15em;
    border:none;border-radius:12px;padding:14px;cursor:pointer;
  }
  #gate .g-err{color:#e08585;font-size:12px;margin-top:12px;min-height:16px;}
  body.locked{overflow:hidden;}
  #app.hidden{display:none;}
</style>
</head>
<body class="locked">
<div id="gate">
  <div class="g-brand">結 ゆ う</div>
  <h1>生命の木スプレッド</h1>
  <p>合言葉を入れてね</p>
  <div class="g-box">
    <input type="password" id="gateInput" placeholder="合言葉" autocomplete="off" aria-label="合言葉">
    <button id="gateBtn">ひらく</button>
    <div class="g-err" id="gateErr"></div>
  </div>
</div>

<div id="app" class="hidden">
<div class="wrap">
  <header>
    <div class="brand">結 ゆ う</div>
    <h1>生命の木スプレッド<small>TREE OF LIFE SPREAD</small></h1>
  </header>
  <p class="lead">カードを引いたら、座をタップして記録してね</p>

  <section class="panel">
    <h2>問い</h2>
    <p class="q-hint">一事一問・動詞で終わる問いにすると読みが締まります</p>
    <input type="text" id="question" placeholder="例：いまの仕事を、これからどう育てる？">
  </section>

  <section class="panel">
    <svg viewBox="0 0 380 720" role="img" aria-label="生命の木スプレッドの配置図" id="tree">
      <g id="paths"></g>
      <g id="positions"></g>
    </svg>
  </section>

  <section class="panel" id="picker">
    <div class="picker-title">第<b id="pkNum"></b>ポジション：<b id="pkName"></b></div>
    <div class="picker-mean" id="pkMean"></div>
    <div class="sel-row">
      <select id="selGroup" aria-label="カードの種類"></select>
      <select id="selCard" aria-label="カード"></select>
    </div>
    <div class="rev-row">
      <input type="checkbox" id="revCheck"><label for="revCheck">逆位置</label>
    </div>
    <div class="btn-row">
      <button class="set-btn" id="setBtn">この座に置く</button>
      <button class="unset-btn" id="unsetBtn">札を外す</button>
    </div>
  </section>

  <section class="panel">
    <h2>スプレッドの記録</h2>
    <div class="list" id="list"></div>
    <button class="copy-btn" id="copyBtn">AIへの発注文をコピーする</button>
    <p class="note">コピーした文をAIに貼ると、そのまま読み解きをお願いできます</p>
    <button class="clear-btn" id="clearBtn">すべてクリアする</button>
  </section>

  <footer>you-no-oto ｜ 結ゆう</footer>
</div>
</div>

<script>
// ---- 合言葉ゲート ----
(function(){
  var HASH="dde77394b750700fcb381c970a956868eb372397f850ae7099f5e880ba7a10e9";
  var input=document.getElementById("gateInput"),
      btn=document.getElementById("gateBtn"),
      err=document.getElementById("gateErr");
  async function sha256(str){
    var buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
  }
  async function tryOpen(){
    var v=input.value.trim();
    if(!v){err.textContent="合言葉を入れてね";return;}
    try{
      var h=await sha256(v);
      if(h===HASH){
        document.getElementById("gate").style.display="none";
        document.getElementById("app").classList.remove("hidden");
        document.body.classList.remove("locked");
      }else{
        err.textContent="合言葉がちがうみたい";
        input.value="";input.focus();
      }
    }catch(e){err.textContent="うまく確認できませんでした";}
  }
  btn.addEventListener("click",tryOpen);
  input.addEventListener("keydown",function(ev){if(ev.key==="Enter")tryOpen();});
  input.focus();
})();
</script>

<script>
(function(){
  var POSITIONS=[
    {id:"keter",num:1,name:"ケテル",mean:"源・最高の可能性",x:190,y:100},
    {id:"chokmah",num:2,name:"コクマー",mean:"動かす力・衝動",x:290,y:180},
    {id:"binah",num:3,name:"ビナー",mean:"形にするもの・制約",x:90,y:180},
    {id:"chesed",num:4,name:"ケセド",mean:"味方・恵み",x:290,y:320},
    {id:"gevurah",num:5,name:"ゲブラー",mean:"試練・削られるもの",x:90,y:320},
    {id:"tiferet",num:6,name:"ティファレト",mean:"核心・本質",x:190,y:400},
    {id:"netzach",num:7,name:"ネツァク",mean:"感情・望み",x:290,y:480},
    {id:"hod",num:8,name:"ホド",mean:"思考・言葉",x:90,y:480},
    {id:"yesod",num:9,name:"イェソド",mean:"無意識の土台・隠れた影響",x:190,y:560},
    {id:"malkuth",num:10,name:"マルクト",mean:"現実の着地・結果",x:190,y:650}
  ];
  var EDGES=[
    ["keter","chokmah"],["keter","binah"],["keter","tiferet"],
    ["chokmah","binah"],["chokmah","tiferet"],["chokmah","chesed"],
    ["binah","tiferet"],["binah","gevurah"],
    ["chesed","gevurah"],["chesed","tiferet"],["chesed","netzach"],
    ["gevurah","tiferet"],["gevurah","hod"],
    ["tiferet","netzach"],["tiferet","hod"],["tiferet","yesod"],
    ["netzach","hod"],["netzach","yesod"],["netzach","malkuth"],
    ["hod","yesod"],["hod","malkuth"],
    ["yesod","malkuth"]
  ];
  var MAJOR=["0 愚者","I 魔術師","II 女教皇","III 女帝","IV 皇帝","V 教皇","VI 恋人","VII 戦車","VIII 力","IX 隠者","X 運命の輪","XI 正義","XII 吊るされた男","XIII 死神","XIV 節制","XV 悪魔","XVI 塔","XVII 星","XVIII 月","XIX 太陽","XX 審判","XXI 世界"];
  var RANKS=["エース","2","3","4","5","6","7","8","9","10","ペイジ","ナイト","クイーン","キング"];
  var GROUPS=[
    {key:"major",label:"大アルカナ",cards:MAJOR},
    {key:"wands",label:"ワンド（杖）",cards:RANKS.map(function(r){return "ワンドの"+r;})},
    {key:"cups",label:"カップ（杯）",cards:RANKS.map(function(r){return "カップの"+r;})},
    {key:"swords",label:"ソード（剣）",cards:RANKS.map(function(r){return "ソードの"+r;})},
    {key:"pents",label:"ペンタクル（金貨）",cards:RANKS.map(function(r){return "ペンタクルの"+r;})}
  ];
  var SHORT={"ワンド":"杖","カップ":"杯","ソード":"剣","ペンタクル":"金"};

  var byId={};POSITIONS.forEach(function(p){byId[p.id]=p;});
  var placed={}; // id -> {card, rev}
  var current=null;

  // 小径
  var pathsG=document.getElementById("paths");
  EDGES.forEach(function(e){
    var a=byId[e[0]],b=byId[e[1]];
    var l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",a.x);l.setAttribute("y1",a.y);
    l.setAttribute("x2",b.x);l.setAttribute("y2",b.y);
    l.setAttribute("class","path-line");
    pathsG.appendChild(l);
  });

  // ポジション
  var posG=document.getElementById("positions");
  POSITIONS.forEach(function(p){
    var g=document.createElementNS("http://www.w3.org/2000/svg","g");
    g.setAttribute("class","pos");g.setAttribute("tabindex","0");
    g.setAttribute("role","button");g.setAttribute("aria-label","第"+p.num+"ポジション "+p.name);
    var c=document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx",p.x);c.setAttribute("cy",p.y);c.setAttribute("r",38);
    c.setAttribute("fill","rgba(10,14,42,.85)");
    c.setAttribute("stroke","rgba(232,201,122,.45)");
    c.setAttribute("stroke-width","1.2");
    g.appendChild(c);
    var tn=document.createElementNS("http://www.w3.org/2000/svg","text");
    tn.setAttribute("x",p.x);tn.setAttribute("y",p.y-20);
    tn.setAttribute("text-anchor","middle");tn.setAttribute("class","pnum");
    tn.textContent=p.num;g.appendChild(tn);
    var t1=document.createElementNS("http://www.w3.org/2000/svg","text");
    t1.setAttribute("x",p.x);t1.setAttribute("y",p.y-4);
    t1.setAttribute("text-anchor","middle");t1.setAttribute("dominant-baseline","central");
    t1.setAttribute("class","pname");
    if(p.name.length>=5)t1.setAttribute("font-size","10.5");
    t1.textContent=p.name;g.appendChild(t1);
    var t2=document.createElementNS("http://www.w3.org/2000/svg","text");
    t2.setAttribute("x",p.x);t2.setAttribute("y",p.y+12);
    t2.setAttribute("text-anchor","middle");t2.setAttribute("dominant-baseline","central");
    t2.setAttribute("class","pmean");
    t2.textContent=p.mean.split("・")[0];g.appendChild(t2);
    var t3=document.createElementNS("http://www.w3.org/2000/svg","text");
    t3.setAttribute("x",p.x);t3.setAttribute("y",p.y+26);
    t3.setAttribute("text-anchor","middle");t3.setAttribute("dominant-baseline","central");
    t3.setAttribute("class","pcard");
    g.appendChild(t3);
    p._g=g;p._cardText=t3;
    function open(){selectPos(p.id);}
    g.addEventListener("click",open);
    g.addEventListener("keydown",function(ev){if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();open();}});
    posG.appendChild(g);
  });

  // セレクト
  var selGroup=document.getElementById("selGroup"),selCard=document.getElementById("selCard");
  GROUPS.forEach(function(gr,i){
    var o=document.createElement("option");o.value=i;o.textContent=gr.label;selGroup.appendChild(o);
  });
  function fillCards(){
    var gr=GROUPS[+selGroup.value];
    selCard.innerHTML="";
    gr.cards.forEach(function(cd){
      var o=document.createElement("option");o.value=cd;o.textContent=cd;selCard.appendChild(o);
    });
  }
  selGroup.addEventListener("change",fillCards);
  fillCards();

  function shortName(card){
    var s=card;
    Object.keys(SHORT).forEach(function(k){s=s.replace(k+"の",SHORT[k]);});
    s=s.replace(/^[0IVX]+ /,"");
    return s;
  }

  function selectPos(id){
    current=id;
    POSITIONS.forEach(function(p){p._g.classList.toggle("selected",p.id===id);});
    var p=byId[id];
    document.getElementById("pkNum").textContent=p.num;
    document.getElementById("pkName").textContent=p.name;
    document.getElementById("pkMean").textContent=p.mean;
    var pk=document.getElementById("picker");
    pk.style.display="block";
    if(placed[id]){
      // 既存の札をセレクトに反映
      for(var gi=0;gi<GROUPS.length;gi++){
        if(GROUPS[gi].cards.indexOf(placed[id].card)>=0){
          selGroup.value=gi;fillCards();selCard.value=placed[id].card;break;
        }
      }
      document.getElementById("revCheck").checked=placed[id].rev;
    }else{
      document.getElementById("revCheck").checked=false;
    }
    pk.scrollIntoView({behavior:"smooth",block:"nearest"});
  }

  document.getElementById("setBtn").addEventListener("click",function(){
    if(!current)return;
    placed[current]={card:selCard.value,rev:document.getElementById("revCheck").checked};
    render();
  });
  document.getElementById("unsetBtn").addEventListener("click",function(){
    if(!current)return;
    delete placed[current];
    render();
  });

  function render(){
    var html="";
    POSITIONS.forEach(function(p){
      var pl=placed[p.id];
      p._g.classList.toggle("filled",!!pl);
      p._cardText.textContent=pl?(shortName(pl.card)+(pl.rev?" 逆":"")):"";
      html+='<div><span class="l-pos">'+p.num+'. '+p.name+'（'+p.mean.split("・")[0]+'）</span>'+
        '<span class="l-card'+(pl?'':' empty')+'">'+
        (pl?(pl.card+(pl.rev?'<span class="rev">逆位置</span>':'')):'— 未配置 —')+
        '</span></div>';
    });
    document.getElementById("list").innerHTML=html;
  }
  render();

  document.getElementById("clearBtn").addEventListener("click",function(){
    if(!confirm("スプレッドの記録をすべてクリアしますか？"))return;
    placed={};current=null;
    POSITIONS.forEach(function(p){p._g.classList.remove("selected");});
    document.getElementById("picker").style.display="none";
    render();
  });

  // AIへの発注文
  document.getElementById("copyBtn").addEventListener("click",function(){
    var q=document.getElementById("question").value.trim();
    var lines=[];
    POSITIONS.forEach(function(p){
      var pl=placed[p.id];
      lines.push("■第"+p.num+"ポジション："+p.name+"（"+p.mean+"）→ "+
        (pl?(pl.card+(pl.rev?"（逆位置）":"（正位置）")):"未配置"));
    });
    var text=
"以下はタロットの「生命の木スプレッド」の展開結果です。\n"+
"カバラの生命の木の10のセフィラの位置に、実際にカードを引いて配置しました。\n"+
"各ポジションの意味とカードを照らし合わせて、読み解きをお願いします。\n\n"+
"【問い】\n"+(q||"（問いは設定していません）")+"\n\n"+
"【展開】\n"+lines.join("\n")+"\n\n"+
"【読み解きの観点】\n"+
"・各セフィラの意味とカードの象意を重ねて読んでください\n"+
"・コートカード（ペイジ・ナイト・クイーン・キング）が出た座は「その座に座っている人物」としても読み、人間関係の相関図として解釈してください\n"+
"・慈悲の柱（2・4・7）と峻厳の柱（3・5・8）と均衡の柱（1・6・9・10）のバランスにも触れてください\n"+
"・大アルカナが多い場合は運命的・魂レベルのテーマとして扱ってください\n"+
"・断定しすぎず、本人が自分に還るキッカケになる言葉でお願いします";
    var btn=this;
    function done(){
      btn.textContent="コピーしました ✓";btn.classList.add("copied");
      setTimeout(function(){btn.textContent="AIへの発注文をコピーする";btn.classList.remove("copied");},2000);
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(fallback);
    }else{fallback();}
    function fallback(){
      var ta=document.createElement("textarea");
      ta.value=text;document.body.appendChild(ta);ta.select();
      try{document.execCommand("copy");done();}catch(e){}
      document.body.removeChild(ta);
    }
  });
})();
</script>
</body>
