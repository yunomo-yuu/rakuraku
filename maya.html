<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マヤ暦 KINナビ｜結ゆう</title>
<style>
  :root{
    --indigo-deep:#0a0e2a;
    --indigo-mid:#141b4d;
    --violet-night:#1a1145;
    --gold:#e8c97a;
    --gold-soft:#d4af6a;
    --text-main:#f0edf7;
    --text-dim:#a9a3c4;
    --card-bg:rgba(20,27,77,.55);
    --card-line:rgba(232,201,122,.25);
    --seal-red:#e06565;
    --seal-white:#ece9f5;
    --seal-blue:#6b96e6;
    --seal-yellow:#e6c65f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    background:linear-gradient(180deg,var(--indigo-deep) 0%,var(--indigo-mid) 55%,var(--violet-night) 100%);
    color:var(--text-main);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
    line-height:1.7;
    position:relative;
    overflow-x:hidden;
  }
  /* 星空 */
  body::before,body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-repeat:repeat;
  }
  body::before{
    background-image:
      radial-gradient(1px 1px at 20px 30px,#fff,transparent),
      radial-gradient(1px 1px at 90px 120px,rgba(255,255,255,.8),transparent),
      radial-gradient(1.5px 1.5px at 160px 60px,rgba(232,201,122,.9),transparent),
      radial-gradient(1px 1px at 220px 160px,rgba(255,255,255,.6),transparent),
      radial-gradient(1px 1px at 300px 90px,rgba(255,255,255,.7),transparent);
    background-size:340px 200px;
    opacity:.9;
  }
  body::after{
    background-image:
      radial-gradient(1px 1px at 60px 180px,rgba(255,255,255,.5),transparent),
      radial-gradient(2px 2px at 260px 40px,rgba(232,201,122,.7),transparent),
      radial-gradient(1px 1px at 140px 140px,rgba(255,255,255,.6),transparent);
    background-size:420px 260px;
    animation:twinkle 5s ease-in-out infinite alternate;
  }
  @keyframes twinkle{from{opacity:.35}to{opacity:.85}}
  @media (prefers-reduced-motion: reduce){
    body::after{animation:none;opacity:.6}
  }
  .wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:32px 18px 60px;}
  header{text-align:center;margin-bottom:28px;}
  .brand{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:13px;letter-spacing:.35em;color:var(--gold-soft);margin-bottom:10px;
  }
  h1{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:28px;font-weight:500;letter-spacing:.12em;
  }
  h1 small{display:block;font-size:12px;color:var(--text-dim);letter-spacing:.25em;margin-top:6px;font-family:inherit;}
  .today{
    text-align:center;font-size:13px;color:var(--text-dim);
    border:1px solid var(--card-line);border-radius:999px;
    padding:6px 16px;display:inline-block;margin:0 auto 30px;
  }
  .today b{color:var(--gold);font-weight:600;}
  .today-row{text-align:center;}

  .panel{
    background:var(--card-bg);
    border:1px solid var(--card-line);
    border-radius:18px;
    padding:24px 20px;
    backdrop-filter:blur(4px);
    margin-bottom:26px;
  }
  .panel h2{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:15px;font-weight:500;letter-spacing:.2em;
    color:var(--gold);text-align:center;margin-bottom:18px;
  }
  .selects{display:flex;gap:10px;justify-content:center;}
  select{
    flex:1;min-width:0;
    background:rgba(10,14,42,.8);color:var(--text-main);
    border:1px solid var(--card-line);border-radius:10px;
    padding:12px 8px;font-size:16px;text-align:center;
    appearance:none;-webkit-appearance:none;
  }
  select:focus{outline:2px solid var(--gold-soft);outline-offset:1px;}
  .calc-btn{
    display:block;width:100%;margin-top:18px;
    background:linear-gradient(135deg,var(--gold) 0%,var(--gold-soft) 100%);
    color:#1a1433;font-size:16px;font-weight:700;letter-spacing:.15em;
    border:none;border-radius:12px;padding:15px;cursor:pointer;
    transition:transform .15s ease,box-shadow .15s ease;
  }
  .calc-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(232,201,122,.35);}
  .calc-btn:focus-visible{outline:2px solid #fff;outline-offset:2px;}

  /* 結果 */
  #result{display:none;}
  .medallion{
    width:210px;height:210px;margin:6px auto 20px;
    border-radius:50%;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1px solid rgba(232,201,122,.5);
    box-shadow:0 0 40px rgba(232,201,122,.18),inset 0 0 30px rgba(232,201,122,.08);
    background:radial-gradient(circle at 50% 38%,rgba(232,201,122,.12),rgba(10,14,42,.2) 70%);
  }
  .medallion::before{
    content:"";position:absolute;inset:9px;border-radius:50%;
    border:1px dashed rgba(232,201,122,.3);
  }
  .tone-glyph{display:flex;align-items:center;gap:5px;height:22px;margin-bottom:2px;flex-direction:column;justify-content:flex-end;}
  .tone-dots{display:flex;gap:5px;}
  .tone-dots i{width:8px;height:8px;border-radius:50%;background:var(--gold);display:block;}
  .tone-bar{width:44px;height:6px;border-radius:3px;background:var(--gold);display:block;margin-bottom:5px;}
  .kin-label{font-size:11px;letter-spacing:.3em;color:var(--text-dim);margin-top:6px;}
  .kin-num{
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    font-size:56px;line-height:1;color:var(--gold);letter-spacing:.02em;
  }
  .kin-name{font-size:14px;color:var(--text-main);margin-top:8px;letter-spacing:.08em;text-align:center;padding:0 14px;}

  .rows{display:flex;flex-direction:column;gap:12px;}
  .row{
    display:flex;align-items:flex-start;gap:12px;
    border-top:1px solid rgba(169,163,196,.15);padding-top:12px;
  }
  .row:first-child{border-top:none;padding-top:0;}
  .row .label{
    flex:0 0 92px;font-size:12px;color:var(--text-dim);letter-spacing:.1em;padding-top:3px;
  }
  .row .value{flex:1;font-size:15px;}
  .row .value .kw{display:block;font-size:12px;color:var(--text-dim);margin-top:2px;}
  .chip{
    display:inline-block;width:10px;height:10px;border-radius:50%;
    margin-right:7px;vertical-align:baseline;border:1px solid rgba(255,255,255,.35);
  }
  .rel-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
  .rel-card{
    border:1px solid rgba(169,163,196,.2);border-radius:12px;
    padding:10px 12px;background:rgba(10,14,42,.35);
  }
  .rel-card .rel-name{font-size:11px;color:var(--text-dim);letter-spacing:.08em;}
  .rel-card .rel-kin{font-size:15px;color:var(--gold);font-weight:600;margin-top:2px;}
  .rel-card .rel-seal{font-size:12px;margin-top:1px;}
  .note{font-size:12px;color:var(--text-dim);margin-top:14px;text-align:center;}

  .copy-btn{
    display:block;width:100%;margin-top:20px;
    background:transparent;color:var(--gold);
    border:1px solid var(--gold-soft);border-radius:12px;
    padding:14px;font-size:15px;letter-spacing:.12em;cursor:pointer;
    transition:background .15s ease;
  }
  .copy-btn:hover{background:rgba(232,201,122,.1);}
  .copy-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .copied{color:#1a1433;background:var(--gold)!important;font-weight:700;}

  footer{text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:.15em;margin-top:34px;}
  .hunab{
    text-align:center;padding:10px 0 4px;
  }
  .hunab p{font-size:14px;}
  .hunab .green{color:#8fd8a0;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:20px;letter-spacing:.1em;margin-bottom:8px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">結 ゆ う</div>
    <h1>マヤ暦 KINナビ<small>TZOLKIN / DREAMSPELL</small></h1>
  </header>

  <div class="today-row"><span class="today" id="todayKin"></span></div>

  <section class="panel">
    <h2>生年月日をえらぶ</h2>
    <div class="selects">
      <select id="selYear" aria-label="年"></select>
      <select id="selMonth" aria-label="月"></select>
      <select id="selDay" aria-label="日"></select>
    </div>
    <button class="calc-btn" id="calcBtn">KINを調べる</button>
  </section>

  <section class="panel" id="result">
    <div id="normalResult">
      <div class="medallion">
        <div class="tone-glyph" id="toneGlyph"></div>
        <div class="kin-num" id="kinNum"></div>
        <div class="kin-label">KIN</div>
        <div class="kin-name" id="kinName"></div>
      </div>
      <div class="rows">
        <div class="row">
          <div class="label">太陽の紋章</div>
          <div class="value" id="sealVal"></div>
        </div>
        <div class="row">
          <div class="label">ウェイブスペル</div>
          <div class="value" id="wsVal"></div>
        </div>
        <div class="row">
          <div class="label">銀河の音</div>
          <div class="value" id="toneVal"></div>
        </div>
        <div class="row">
          <div class="label">城</div>
          <div class="value" id="castleVal"></div>
        </div>
        <div class="row">
          <div class="label">関係するKIN</div>
          <div class="value">
            <div class="rel-grid" id="relGrid"></div>
          </div>
        </div>
      </div>
      <button class="copy-btn" id="copyBtn">AIへの発注文をコピーする</button>
      <p class="note">コピーした文をAIに貼ると、そのまま鑑定をお願いできます</p>
    </div>
    <div id="hunabResult" class="hunab" style="display:none;">
      <p class="green">フナブ・クの日</p>
      <p>2月29日は、ドリームスペルでは<br>特定のKINを持たない「緑の日」とされています。</p>
      <p class="note">時間の外側にある、宇宙とつながる特別な一日。</p>
    </div>
  </section>

  <footer>you-no-oto ｜ 結ゆう</footer>
</div>

<script>
(function(){
  // ---- データ定義 ----
  var SEALS = [
    {name:"赤い龍", color:"red", kw:"いのちを育む・母性・誕生"},
    {name:"白い風", color:"white", kw:"メッセージ・共感・スピリット"},
    {name:"青い夜", color:"blue", kw:"夢・豊かさ・直感"},
    {name:"黄色い種", color:"yellow", kw:"気づき・開花・探究心"},
    {name:"赤い蛇", color:"red", kw:"情熱・生命力・本能"},
    {name:"白い世界の橋渡し", color:"white", kw:"橋渡し・死と再生・おもてなし"},
    {name:"青い手", color:"blue", kw:"癒し・遂行・チャンス"},
    {name:"黄色い星", color:"yellow", kw:"美と調和・芸術・職人"},
    {name:"赤い月", color:"red", kw:"浄化・新しい流れ・使命感"},
    {name:"白い犬", color:"white", kw:"誠実・家族愛・忠実"},
    {name:"青い猿", color:"blue", kw:"遊び心・ひらめき・魔術"},
    {name:"黄色い人", color:"yellow", kw:"自由意志・道理・感化"},
    {name:"赤い空歩く人", color:"red", kw:"探究・成長・人助け"},
    {name:"白い魔法使い", color:"white", kw:"魅了・受容・永遠"},
    {name:"青いワシ", color:"blue", kw:"先見性・観察力・知性"},
    {name:"黄色い戦士", color:"yellow", kw:"挑戦・知性・自問自答"},
    {name:"赤い地球", color:"red", kw:"シンクロ・絆・舵取り"},
    {name:"白い鏡", color:"white", kw:"映し出す・永遠性・調和"},
    {name:"青い嵐", color:"blue", kw:"変容・かまど・エネルギー"},
    {name:"黄色い太陽", color:"yellow", kw:"太陽の力・公平・完成"}
  ];
  var TONES = [
    {name:"磁気", kw:"目的・引き寄せる"},
    {name:"月", kw:"挑戦・見きわめる"},
    {name:"電気", kw:"奉仕・活性化する"},
    {name:"自己存在", kw:"形・測る"},
    {name:"倍音", kw:"輝き・中心を定める"},
    {name:"律動", kw:"バランス・組織する"},
    {name:"共振", kw:"調律・通わせる"},
    {name:"銀河", kw:"調和・誠実さ"},
    {name:"太陽", kw:"意図・脈動させる"},
    {name:"惑星", kw:"仕上げ・実らせる"},
    {name:"スペクトル", kw:"解放・手放す"},
    {name:"水晶", kw:"協力・分かち合う"},
    {name:"宇宙", kw:"超越・持ちこたえる"}
  ];
  var CASTLES = ["赤い東の城（回す・始まり）","白い北の城（浄化・洗練）","青い西の城（変容・燃やす）","黄色い南の城（実り・与える）","緑の中央の城（魔法・共時性）"];
  var SEAL_COLOR = {red:"var(--seal-red)", white:"var(--seal-white)", blue:"var(--seal-blue)", yellow:"var(--seal-yellow)"};
  var GUIDE_OFFSET = {1:0,6:0,11:0, 2:12,7:12,12:12, 3:4,8:4,13:4, 4:16,9:16, 5:8,10:8};

  // ---- KIN計算（アンカー: 2012-12-21 = KIN207 / 2月29日はKINを持たない）----
  function isLeap(y){return (y%4===0 && y%100!==0) || y%400===0;}
  function serial(y,m,d){return Date.UTC(y,m-1,d)/86400000;}
  function leapDaysUpTo(y,m,d){
    var c=0;
    for(var yy=1800; yy<=y; yy++){
      if(!isLeap(yy)) continue;
      if(yy<y || m>2 || (m===2 && d>=29)) c++;
    }
    return c;
  }
  function dayCounter(y,m,d){return serial(y,m,d) - leapDaysUpTo(y,m,d);}
  var ANCHOR = dayCounter(2012,12,21); // KIN207
  function kinOf(y,m,d){
    if(m===2 && d===29) return null; // フナブ・クの日
    var diff = dayCounter(y,m,d) - ANCHOR;
    var k = ((207 - 1 + diff) % 260 + 260) % 260 + 1;
    return k;
  }
  function sealIdx(kin){return ((kin-1) % 20);}          // 0-19
  function toneIdx(kin){return ((kin-1) % 13);}          // 0-12
  function wsStartKin(kin){return Math.floor((kin-1)/13)*13 + 1;}
  function castleIdx(kin){return Math.floor((kin-1)/52);}
  function kinFrom(sealNo, toneNo){ // 1-20, 1-13
    for(var k=1;k<=260;k++){
      if(sealIdx(k)===sealNo-1 && toneIdx(k)===toneNo-1) return k;
    }
    return null;
  }

  // ---- セレクト生成 ----
  var selY=document.getElementById("selYear"),
      selM=document.getElementById("selMonth"),
      selD=document.getElementById("selDay");
  var now=new Date();
  for(var y=now.getFullYear(); y>=1900; y--){
    var o=document.createElement("option");o.value=y;o.textContent=y+"年";selY.appendChild(o);
  }
  selY.value=1980;
  for(var m=1;m<=12;m++){
    var o2=document.createElement("option");o2.value=m;o2.textContent=m+"月";selM.appendChild(o2);
  }
  function fillDays(){
    var y=+selY.value,m=+selM.value;
    var dim=[31, isLeap(y)?29:28, 31,30,31,30,31,31,30,31,30,31][m-1];
    var cur=+selD.value||1;
    selD.innerHTML="";
    for(var d=1;d<=dim;d++){
      var o3=document.createElement("option");o3.value=d;o3.textContent=d+"日";selD.appendChild(o3);
    }
    selD.value=Math.min(cur,dim);
  }
  selY.addEventListener("change",fillDays);
  selM.addEventListener("change",fillDays);
  fillDays();

  // ---- 今日のKIN ----
  (function(){
    var t=new Date();
    var k=kinOf(t.getFullYear(),t.getMonth()+1,t.getDate());
    var el=document.getElementById("todayKin");
    if(k===null){
      el.innerHTML="今日は <b>フナブ・クの日</b>（緑の日）";
    }else{
      el.innerHTML="今日のKINは <b>KIN "+k+"</b> "+TONES[toneIdx(k)].name+"の"+SEALS[sealIdx(k)].name;
    }
  })();

  // ---- 表示 ----
  var lastData=null;
  function chipHtml(colorKey){
    return '<span class="chip" style="background:'+SEAL_COLOR[colorKey]+'"></span>';
  }
  function toneGlyphHtml(tone){
    var bars=Math.floor(tone/5), dots=tone%5, h="";
    for(var i=0;i<bars;i++) h+='<span class="tone-bar"></span>';
    if(dots>0){
      h+='<span class="tone-dots">';
      for(var j=0;j<dots;j++) h+="<i></i>";
      h+="</span>";
    }
    return h;
  }
  function relCard(name,sealNo){
    var s=SEALS[sealNo-1];
    return '<div class="rel-card"><div class="rel-name">'+name+'</div>'+
           '<div class="rel-kin">'+chipHtml(s.color)+s.name+'</div>'+
           '<div class="rel-seal">'+s.kw+'</div></div>';
  }
  document.getElementById("calcBtn").addEventListener("click",function(){
    var y=+selY.value,m=+selM.value,d=+selD.value;
    var result=document.getElementById("result");
    var normal=document.getElementById("normalResult");
    var hunab=document.getElementById("hunabResult");
    result.style.display="block";
    var kin=kinOf(y,m,d);
    if(kin===null){
      normal.style.display="none";hunab.style.display="block";lastData=null;
      result.scrollIntoView({behavior:"smooth",block:"start"});
      return;
    }
    normal.style.display="block";hunab.style.display="none";

    var sIdx=sealIdx(kin), tIdx=toneIdx(kin);
    var seal=SEALS[sIdx], tone=TONES[tIdx];
    var toneNo=tIdx+1, sealNo=sIdx+1;
    var wsKin=wsStartKin(kin);
    var ws=SEALS[sealIdx(wsKin)];
    var castle=CASTLES[castleIdx(kin)];

    // 関係する紋章
    var guideSealNo=((sealNo-1+GUIDE_OFFSET[toneNo])%20)+1;
    var analogSealNo=((19-sealNo)%20+20)%20; if(analogSealNo===0) analogSealNo=20;
    var antiSealNo=((sealNo+10-1)%20)+1;
    var occultSealNo=21-sealNo;
    var mirrorKin=261-kin; // 鏡の向こうのKIN

    document.getElementById("toneGlyph").innerHTML=toneGlyphHtml(toneNo);
    document.getElementById("kinNum").textContent=kin;
    document.getElementById("kinName").textContent=tone.name+"の"+seal.name;
    document.getElementById("sealVal").innerHTML=chipHtml(seal.color)+seal.name+
      '<span class="kw">'+seal.kw+'</span>';
    document.getElementById("wsVal").innerHTML=chipHtml(ws.color)+ws.name+
      '<span class="kw">13日間の目的・潜在意識</span>';
    document.getElementById("toneVal").innerHTML="音"+toneNo+"・"+tone.name+
      '<span class="kw">'+tone.kw+'</span>';
    document.getElementById("castleVal").textContent=castle;
    var mSeal=SEALS[sealIdx(mirrorKin)], mTone=TONES[toneIdx(mirrorKin)];
    document.getElementById("relGrid").innerHTML=
      relCard("ガイド（導き）",guideSealNo)+
      relCard("類似（支え合う）",analogSealNo)+
      relCard("反対（学び合う）",antiSealNo)+
      relCard("神秘（ひかれ合う）",occultSealNo)+
      '<div class="rel-card" style="grid-column:1/-1;">'+
      '<div class="rel-name">鏡の向こうのKIN</div>'+
      '<div class="rel-kin">KIN '+mirrorKin+'</div>'+
      '<div class="rel-seal">'+chipHtml(mSeal.color)+mTone.name+'の'+mSeal.name+'</div></div>';

    lastData={
      date:y+"年"+m+"月"+d+"日", kin:kin,
      seal:seal, ws:ws, toneNo:toneNo, tone:tone, castle:castle,
      guideSealNo:guideSealNo, analogSealNo:analogSealNo,
      antiSealNo:antiSealNo, occultSealNo:occultSealNo,
      mirrorKin:mirrorKin
    };
    result.scrollIntoView({behavior:"smooth",block:"start"});
  });

  // ---- AIへの発注文コピー ----
  function sealLine(sealNo){
    var s=SEALS[sealNo-1];
    return s.name+"（"+s.kw+"）";
  }
  document.getElementById("copyBtn").addEventListener("click",function(){
    if(!lastData) return;
    var d=lastData;
    var mk=d.mirrorKin;
    var text=
"以下はマヤ暦（ツォルキン／ドリームスペル）の鑑定データです。\n"+
"このデータをもとに、性格・才能・使命の傾向をわかりやすく解説してください。\n\n"+
"■生年月日："+d.date+"\n"+
"■KIN："+d.kin+"（"+d.tone.name+"の"+d.seal.name+"）\n"+
"■太陽の紋章："+d.seal.name+"（キーワード："+d.seal.kw+"）\n"+
"■ウェイブスペル："+d.ws.name+"\n"+
"■銀河の音：音"+d.toneNo+"・"+d.tone.name+"（キーワード："+d.tone.kw+"）\n"+
"■城："+d.castle+"\n"+
"■ガイドの紋章："+sealLine(d.guideSealNo)+"\n"+
"■類似の紋章："+sealLine(d.analogSealNo)+"\n"+
